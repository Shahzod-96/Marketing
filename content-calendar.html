var typeColors={brand:"#1e40af",edu:"#059669",trust:"#d97706",viral:"#7c3aed",sales:"#dc2626",story:"#6b7280"};
var typeLabels={brand:"Brand",edu:"Edu",trust:"Trust",viral:"Viral",sales:"Sales",story:"Story"};
var dayNames=["Dush","Sesh","Chor","Pay","Jum","Shan","Yak"];

function renderCalendar(){
var cal=document.getElementById("calendar");
var html="";
for(var i=0;i<0;i++){html+='<div class="day-card empty"></div>';}
for(var d=0;d<days.length;d++){
var item=days[d];
var color=typeColors[item.type];
html+='<div class="day-card" onclick="openModal('+d+')">';
if(item.boost){html+='<span class="boost-badge">'+item.boost+'</span>';}
html+='<div class="day-num" style="color:'+color+'">'+item.day+'</div>';
html+='<span class="day-type type-'+item.type+'">'+typeLabels[item.type]+'</span>';
html+='<div class="day-title">'+item.title+'</div>';
html+='</div>';
}
cal.innerHTML=html;
}

function openModal(idx){
var item=days[idx];
var color=typeColors[item.type];
var html='<div style="margin-bottom:16px"><span style="background:'+color+';color:#fff;padding:4px 12px;border-radius:6px;font-size:0.8rem;font-weight:600">'+typeLabels[item.type].toUpperCase()+'</span>';
if(item.boost){html+=' <span style="background:#f59e0b;color:#fff;padding:4px 10px;border-radius:6px;font-size:0.8rem;font-weight:600">BOOST '+item.boost+'</span>';}
html+='</div>';
html+='<h2 style="font-size:1.5rem;color:#1e293b;margin-bottom:4px">Kun '+item.day+'</h2>';
html+='<h3 style="font-size:1.1rem;color:'+color+';margin-bottom:20px;font-weight:500">'+item.title+'</h3>';
if(item.type==="story"){
html+='<div style="margin-bottom:16px"><strong style="color:#1e293b">Stories:</strong></div>';
for(var s=0;s<item.stories.length;s++){
html+='<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:8px"><span style="color:'+color+';font-weight:600">Story '+(s+1)+':</span> '+item.stories[s]+'</div>';
}
}else{
html+='<div style="background:#eff6ff;border-left:4px solid '+color+';padding:16px;border-radius:0 8px 8px 0;margin-bottom:16px"><strong style="color:#1e293b">Hook (birinchi 3 sekund):</strong><br><span style="font-size:1.1rem;color:'+color+'">'+item.hook+'</span></div>';
html+='<div style="margin-bottom:16px"><strong style="color:#1e293b">Kontent:</strong><p style="margin-top:6px;color:#475569">'+item.content+'</p></div>';
html+='<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px;margin-bottom:16px"><strong style="color:#059669">CTA:</strong> '+item.cta+'</div>';
html+='<div style="margin-bottom:16px"><strong style="color:#1e293b">Caption (copy-paste tayyor):</strong><pre style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-top:6px;white-space:pre-wrap;font-family:inherit;font-size:0.9rem;color:#475569">'+item.caption.replace(/\\n/g,"\n")+'</pre></div>';
html+='<div style="background:#fefce8;border:1px solid #fde68a;border-radius:8px;padding:12px"><strong style="color:#d97706">Mobilograf uchun:</strong><p style="margin-top:4px;color:#475569">'+item.mobilograf+'</p></div>';
}
document.getElementById("modal-content").innerHTML=html;
document.getElementById("modal-overlay").style.display="block";
document.body.style.overflow="hidden";
}

function closeModal(){
document.getElementById("modal-overlay").style.display="none";
document.body.style.overflow="auto";
}

document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal();});
renderCalendar();
</script>
